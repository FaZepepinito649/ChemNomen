<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChemNomen — IUPAC Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a1f5e;--navy2:#252b7e;--pink:#e8408a;--pink2:#f5a8cc;
  --green:#5abf32;--green2:#a3e07c;--cream:#f5f7ff;--white:#fff;
  --gray:#8891b5;--error:#ef4444;--ok:#22c55e;--warn:#f59e0b;
  --border:rgba(26,31,94,.1);--sh:0 4px 24px rgba(26,31,94,.1)
}
body{
  font-family:'Nunito',sans-serif;background:var(--cream);
  background-image:linear-gradient(rgba(26,31,94,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(26,31,94,.05) 1px,transparent 1px);
  background-size:28px 28px;min-height:100vh;color:var(--navy)
}
header{
  background:var(--navy);color:#fff;padding:10px 20px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)
}
.logo{display:flex;align-items:center;gap:10px;font-weight:900;font-size:1.35rem}
.logo-ico{width:34px;height:34px;background:var(--pink);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.05rem}
.hdr-right{display:flex;align-items:center;gap:10px}
.badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:5px 14px;font-weight:700;font-size:.85rem;color:#fff}
.badge .num{color:var(--green2)}
.layout{display:grid;grid-template-columns:1fr 370px;max-width:1160px;margin:0 auto;min-height:calc(100vh - 54px)}
.quiz{padding:20px;display:flex;flex-direction:column;gap:18px}
.filters{display:flex;gap:7px;flex-wrap:wrap}
.fbtn{
  background:#fff;border:2px solid var(--border);border-radius:20px;
  padding:5px 13px;font-family:inherit;font-size:.77rem;font-weight:800;
  color:var(--gray);cursor:pointer;transition:all .18s;letter-spacing:.2px
}
.fbtn:hover{border-color:var(--navy);color:var(--navy)}
.fbtn.on{background:var(--navy);border-color:var(--navy);color:#fff}
.card{background:#fff;border-radius:20px;box-shadow:var(--sh);border:2px solid var(--border);overflow:hidden;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.img-wrap{background:linear-gradient(135deg,#e8edf8,#f0f4ff);display:flex;align-items:center;justify-content:center;min-height:260px;position:relative}
#structImg{max-width:310px;max-height:244px;object-fit:contain;display:none;border-radius:6px}
.cat-badge{
  position:absolute;top:12px;left:12px;background:var(--navy);color:#fff;
  padding:4px 12px;border-radius:12px;font-size:.72rem;font-weight:900;text-transform:uppercase;letter-spacing:.6px
}
.img-loader{
  width:42px;height:42px;border:3px solid var(--border);border-top-color:var(--navy);
  border-radius:50%;animation:spin .8s linear infinite;position:absolute
}
@keyframes spin{to{transform:rotate(360deg)}}
.img-err{color:var(--gray);font-size:.88rem;text-align:center;padding:20px}
.card-body{padding:20px}
.attempts{display:flex;align-items:center;gap:8px;margin-bottom:15px}
.att-lbl{font-size:.77rem;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:.4px}
.dot{width:18px;height:18px;border-radius:50%;border:2.5px solid #dde;background:#fff;transition:all .3s}
.dot.bad{background:var(--error);border-color:var(--error);transform:scale(1.1)}
.ans-row{display:flex;gap:10px}
#ansInput{
  flex:1;padding:13px 16px;border:2.5px solid var(--border);border-radius:13px;
  font-family:'Fira Code',monospace;font-size:1rem;color:var(--navy);
  background:#fff;outline:none;transition:border-color .2s
}
#ansInput:focus{border-color:var(--navy)}
#ansInput.ok{border-color:var(--ok);background:#f0fdf4}
#ansInput.bad{border-color:var(--error);background:#fff1f1;animation:shake .38s}
@keyframes shake{0%,100%{transform:translateX(0)}30%{transform:translateX(-9px)}70%{transform:translateX(9px)}}
.sub-btn{
  padding:13px 22px;background:var(--navy);color:#fff;border:none;border-radius:13px;
  font-family:inherit;font-weight:900;font-size:.92rem;cursor:pointer;transition:all .18s;white-space:nowrap
}
.sub-btn:hover{background:var(--navy2);transform:translateY(-1px)}
.sub-btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.fb{padding:11px 15px;border-radius:12px;font-weight:700;font-size:.88rem;display:none;margin-top:12px}
.fb.ok{background:#dcfce7;color:#166534;border:2px solid #86efac;display:block}
.fb.bad{background:#fee2e2;color:#991b1b;border:2px solid #fca5a5;display:block}
.reveal{margin-top:16px;background:#fffbee;border:2px solid #fcd34d;border-radius:16px;padding:18px;display:none}
.reveal.on{display:block}
.reveal-lbl{font-size:.72rem;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:#92400e;margin-bottom:8px}
.reveal-name{
  font-family:'Fira Code',monospace;font-size:1.3rem;font-weight:600;
  color:#fcd34d;background:var(--navy);padding:9px 16px;border-radius:10px;
  display:inline-block;margin-bottom:14px
}
.steps-list{list-style:none;display:flex;flex-direction:column;gap:7px}
.step{display:flex;align-items:flex-start;gap:9px;font-size:.85rem;color:#78350f;line-height:1.45}
.snum{
  width:21px;height:21px;border-radius:50%;background:#fcd34d;color:var(--navy);
  font-weight:900;font-size:.72rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px
}
.next-btn{
  width:100%;padding:13px;background:linear-gradient(135deg,var(--green),#4ade80);
  color:var(--navy);border:none;border-radius:13px;font-family:inherit;font-weight:900;
  font-size:.95rem;cursor:pointer;transition:all .2s;margin-top:12px;display:none
}
.next-btn.on{display:block}
.next-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(90,191,50,.3)}
.chatpanel{
  background:#fff;border-left:2px solid var(--border);display:flex;
  flex-direction:column;height:calc(100vh - 54px);position:sticky;top:54px
}
.chat-hdr{
  background:var(--navy);color:#fff;padding:14px 18px;
  display:flex;align-items:center;gap:11px;flex-shrink:0
}
.bot-ava{width:34px;height:34px;background:var(--pink);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem}
.chat-title{font-weight:900;font-size:.95rem}
.chat-sub{font-size:.73rem;color:var(--pink2);margin-top:1px}
.msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
.msg{max-width:86%;line-height:1.5;font-size:.86rem;word-break:break-word}
.msg.u{align-self:flex-end;background:var(--navy);color:#fff;padding:9px 13px;border-radius:14px 14px 4px 14px}
.msg.b{align-self:flex-start;background:#f0f4ff;color:var(--navy);padding:9px 13px;border-radius:4px 14px 14px 14px;border:1.5px solid var(--border);white-space:pre-wrap}
.typing{display:none;gap:4px;padding:9px 13px;background:#f0f4ff;border-radius:4px 14px 14px 14px;border:1.5px solid var(--border);align-self:flex-start}
.typing.on{display:flex}
.tdot{width:6px;height:6px;background:var(--gray);border-radius:50%;animation:tb 1.2s infinite}
.tdot:nth-child(2){animation-delay:.2s}
.tdot:nth-child(3){animation-delay:.4s}
@keyframes tb{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.chat-foot{padding:12px 14px;border-top:2px solid var(--border);display:flex;gap:8px;flex-shrink:0}
#chatIn{
  flex:1;padding:9px 13px;border:2px solid var(--border);border-radius:11px;
  font-family:inherit;font-size:.85rem;resize:none;outline:none;
  max-height:96px;min-height:40px;line-height:1.4;transition:border-color .18s
}
#chatIn:focus{border-color:var(--navy)}
.send-btn{
  padding:9px 15px;background:var(--pink);color:#fff;border:none;border-radius:11px;
  font-weight:900;font-size:.85rem;cursor:pointer;transition:all .18s;align-self:flex-end
}
.send-btn:hover{opacity:.87;transform:translateY(-1px)}
.send-btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.empty{text-align:center;padding:50px 20px;color:var(--gray);display:none}
@media(max-width:768px){
  .layout{grid-template-columns:1fr}
  .chatpanel{position:fixed;bottom:0;left:0;right:0;height:62vh;border-left:none;border-top:2px solid var(--border);display:none;z-index:200}
  .chatpanel.mob-open{display:flex}
  .chat-fab{display:flex;position:fixed;bottom:18px;right:18px;width:52px;height:52px;background:var(--pink);border-radius:50%;align-items:center;justify-content:center;color:#fff;font-size:1.4rem;cursor:pointer;box-shadow:0 4px 16px rgba(232,64,138,.4);z-index:210;border:none}
}
@media(min-width:769px){.chat-fab{display:none}}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-ico">⚗️</div>
    ChemNomen
  </div>
  <div class="hdr-right">
    <div class="badge">Score: <span class="num" id="sc">0/0</span></div>
    <div class="badge" id="strkBadge" style="display:none">🔥 <span id="strkN">0</span></div>
  </div>
</header>

<div class="layout">
  <div class="quiz">
    <div class="filters" id="filterBar">
      <button class="fbtn on" data-cat="all">All</button>
      <button class="fbtn" data-cat="alkane">Alkanes</button>
      <button class="fbtn" data-cat="alkene">Alkenes</button>
      <button class="fbtn" data-cat="alkyne">Alkynes</button>
      <button class="fbtn" data-cat="alcohol">Alcohols</button>
      <button class="fbtn" data-cat="aldehyde">Aldehydes</button>
      <button class="fbtn" data-cat="ketone">Ketones</button>
      <button class="fbtn" data-cat="carboxylic acid">Acids</button>
      <button class="fbtn" data-cat="amine">Amines</button>
      <button class="fbtn" data-cat="amide">Amides</button>
      <button class="fbtn" data-cat="aromatic">Aromatics</button>
    </div>

    <div class="card" id="mainCard">
      <div class="img-wrap">
        <div class="img-loader" id="imgLdr"></div>
        <img id="structImg" alt="Chemical structure">
        <div class="img-err" id="imgErr" style="display:none">⚠ Structure unavailable</div>
        <div class="cat-badge" id="catBadge">—</div>
      </div>
      <div class="card-body">
        <div class="attempts">
          <span class="att-lbl">Attempts</span>
          <div class="dot" id="d1"></div>
          <div class="dot" id="d2"></div>
          <div class="dot" id="d3"></div>
        </div>
        <div class="ans-row">
          <input type="text" id="ansInput" placeholder="Type the IUPAC name…" autocomplete="off" spellcheck="false">
          <button class="sub-btn" id="subBtn" onclick="submit()">Submit ↵</button>
        </div>
        <div class="fb" id="fbMsg"></div>
        <div class="reveal" id="revPanel">
          <div class="reveal-lbl">✨ Answer &amp; Naming Steps</div>
          <div class="reveal-name" id="revName"></div>
          <ul class="steps-list" id="stepsUl"></ul>
        </div>
        <button class="next-btn" id="nextBtn" onclick="nextQ()">Next Compound →</button>
      </div>
    </div>
    <div class="empty" id="emptyMsg">
      <div style="font-size:2rem;margin-bottom:8px">🧪</div>
      <strong>No compounds in this category.</strong><br>Choose a different filter.
    </div>
  </div>

  <div class="chatpanel" id="chatPanel">
    <div class="chat-hdr">
      <div class="bot-ava">🤖</div>
      <div>
        <div class="chat-title">ChemBot</div>
        <div class="chat-sub">Your IUPAC nomenclature tutor</div>
      </div>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="typing" id="typing">
      <div class="tdot"></div><div class="tdot"></div><div class="tdot"></div>
    </div>
    <div class="chat-foot">
      <textarea id="chatIn" rows="1" placeholder="Ask about naming rules…" onkeydown="chatKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendChat()">Send</button>
    </div>
  </div>
</div>

<button class="chat-fab" onclick="toggleChat()">💬</button>

<script>
// ══════════════════════════════════════════════════
//  NAMING STEPS PER CATEGORY
// ══════════════════════════════════════════════════
const STEPS = {
  alkane:[
    "Find the longest continuous carbon chain → this determines the parent name (meth/eth/prop/but/pent/hex…)",
    "Number carbons from the end CLOSEST to substituents so they get the lowest possible locants",
    "Name each substituent: [position]-[group]yl  (e.g. 2-methyl, 3-ethyl…)",
    "Use multiplying prefixes for repeated substituents: di-, tri-, tetra-… (ignore these when alphabetizing)",
    "List substituents alphabetically, then append parent chain name + -ane"
  ],
  alkene:[
    "Find the longest chain that CONTAINS the C=C double bond",
    "Number from the end CLOSEST to the double bond (lowest locant rule)",
    "Change -ane to -ene and place the double-bond locant before -ene: e.g. but-2-ene",
    "For ethene (2C) no locant is needed; propene (3C) can only be at C1 so also no locant",
    "Add any substituents with their locants alphabetically before the parent chain"
  ],
  alkyne:[
    "Find the longest chain that CONTAINS the C≡C triple bond",
    "Number from the end CLOSEST to the triple bond",
    "Change -ane to -yne and place the locant before -yne: e.g. but-2-yne",
    "For ethyne (2C) no locant is needed",
    "Add substituents alphabetically with locants as usual"
  ],
  alcohol:[
    "Find the longest chain that CONTAINS the –OH group",
    "Number from the end CLOSEST to –OH so it gets the lowest locant",
    "Replace the final -e of the alkane name with -ol and insert the –OH locant before -ol: e.g. propan-2-ol",
    "For methanol (1C) and ethanol (2C) no locant is needed",
    "If other functional groups are present, check priority: –COOH > –CHO > C=O > –OH"
  ],
  aldehyde:[
    "Identify the –CHO (formyl) group — it is ALWAYS carbon #1",
    "Count all carbons including the carbonyl carbon",
    "Replace the final -e of the alkane name with -al: 3C → propanal",
    "No locant is needed because the carbonyl is always at C1",
    "Common names: methanal = formaldehyde, ethanal = acetaldehyde"
  ],
  ketone:[
    "Identify the C=O that is NOT at the chain end (end = aldehyde; middle = ketone)",
    "Find the longest chain containing the C=O",
    "Number the chain to give C=O the LOWEST possible locant",
    "Replace final -e with -one and place the locant before -one: e.g. pentan-3-one",
    "For propanone (3C, only one position) no locant is needed"
  ],
  "carboxylic acid":[
    "Identify the –COOH group — it is ALWAYS carbon #1",
    "Count all carbons including the carboxyl carbon",
    "Replace the final -e of the alkane name with -oic acid: 3C → propanoic acid",
    "The word 'acid' always appears at the very end",
    "Common names: methanoic acid = formic acid, ethanoic acid = acetic acid"
  ],
  amine:[
    "Identify the nitrogen group: –NH₂ (primary), –NH– (secondary), –N< (tertiary)",
    "Primary amines: parent chain + suffix -amine; number from the end closest to –NH₂",
    "Secondary/tertiary: the longest chain is the parent; other N-groups get the prefix N-",
    "Example: CH₃NH₂ → methanamine; (CH₃)₂NH → N-methylmethanamine",
    "Aniline and other aromatic amines retain their common IUPAC names"
  ],
  amide:[
    "Identify the –CONH₂ group — it is ALWAYS carbon #1",
    "Count all carbons including the carbonyl carbon",
    "Replace -ic acid (or final -e) with -amide: 2C → ethanamide",
    "No locant is needed (the amide group is always at C1)",
    "Common names: methanamide = formamide, ethanamide = acetamide"
  ],
  aromatic:[
    "Identify the benzene ring as the parent structure",
    "One substituent: [substituent]benzene — e.g. methylbenzene, chlorobenzene",
    "Two substituents: number the ring for lowest locants (or use ortho-/meta-/para-)",
    "Retained IUPAC names: toluene → methylbenzene; aniline → aniline or aminobenzene",
    "Common substituent prefixes: methyl-, ethyl-, chloro-, bromo-, nitro-, amino-"
  ]
};

// ══════════════════════════════════════════════════
//  COMPOUND DATABASE (63 compounds)
// ══════════════════════════════════════════════════
const DB = [
  // ALKANES
  {id:1,iupac:"propane",look:"propane",acc:["propane"],cat:"alkane"},
  {id:2,iupac:"butane",look:"butane",acc:["butane"],cat:"alkane"},
  {id:3,iupac:"pentane",look:"pentane",acc:["pentane"],cat:"alkane"},
  {id:4,iupac:"hexane",look:"hexane",acc:["hexane"],cat:"alkane"},
  {id:5,iupac:"2-methylpropane",look:"isobutane",acc:["2-methylpropane","isobutane"],cat:"alkane"},
  {id:6,iupac:"2-methylbutane",look:"isopentane",acc:["2-methylbutane","isopentane"],cat:"alkane"},
  {id:7,iupac:"2,2-dimethylpropane",look:"neopentane",acc:["2,2-dimethylpropane","neopentane"],cat:"alkane"},
  {id:8,iupac:"2,3-dimethylbutane",look:"2,3-dimethylbutane",acc:["2,3-dimethylbutane"],cat:"alkane"},
  {id:9,iupac:"3-methylpentane",look:"3-methylpentane",acc:["3-methylpentane"],cat:"alkane"},
  {id:10,iupac:"2-methylpentane",look:"2-methylpentane",acc:["2-methylpentane","isohexane"],cat:"alkane"},
  {id:11,iupac:"2,2-dimethylbutane",look:"2,2-dimethylbutane",acc:["2,2-dimethylbutane"],cat:"alkane"},
  // ALKENES
  {id:12,iupac:"ethene",look:"ethylene",acc:["ethene","ethylene"],cat:"alkene"},
  {id:13,iupac:"propene",look:"propylene",acc:["propene","propylene"],cat:"alkene"},
  {id:14,iupac:"but-1-ene",look:"1-butene",acc:["but-1-ene","1-butene"],cat:"alkene"},
  {id:15,iupac:"but-2-ene",look:"2-butene",acc:["but-2-ene","2-butene"],cat:"alkene"},
  {id:16,iupac:"2-methylpropene",look:"isobutylene",acc:["2-methylpropene","2-methyl-1-propene","isobutylene","isobutene"],cat:"alkene"},
  {id:17,iupac:"pent-1-ene",look:"1-pentene",acc:["pent-1-ene","1-pentene"],cat:"alkene"},
  {id:18,iupac:"3-methylbut-1-ene",look:"3-methyl-1-butene",acc:["3-methylbut-1-ene","3-methyl-1-butene"],cat:"alkene"},
  {id:19,iupac:"2-methylbut-2-ene",look:"2-methyl-2-butene",acc:["2-methylbut-2-ene","2-methyl-2-butene"],cat:"alkene"},
  // ALKYNES
  {id:20,iupac:"ethyne",look:"acetylene",acc:["ethyne","acetylene"],cat:"alkyne"},
  {id:21,iupac:"propyne",look:"methylacetylene",acc:["propyne","prop-1-yne","methylacetylene"],cat:"alkyne"},
  {id:22,iupac:"but-1-yne",look:"1-butyne",acc:["but-1-yne","1-butyne"],cat:"alkyne"},
  {id:23,iupac:"but-2-yne",look:"2-butyne",acc:["but-2-yne","2-butyne"],cat:"alkyne"},
  {id:24,iupac:"pent-1-yne",look:"1-pentyne",acc:["pent-1-yne","1-pentyne"],cat:"alkyne"},
  // ALCOHOLS
  {id:25,iupac:"methanol",look:"methanol",acc:["methanol"],cat:"alcohol"},
  {id:26,iupac:"ethanol",look:"ethanol",acc:["ethanol","ethyl alcohol"],cat:"alcohol"},
  {id:27,iupac:"propan-1-ol",look:"1-propanol",acc:["propan-1-ol","1-propanol"],cat:"alcohol"},
  {id:28,iupac:"propan-2-ol",look:"2-propanol",acc:["propan-2-ol","2-propanol","isopropanol"],cat:"alcohol"},
  {id:29,iupac:"butan-1-ol",look:"1-butanol",acc:["butan-1-ol","1-butanol"],cat:"alcohol"},
  {id:30,iupac:"butan-2-ol",look:"2-butanol",acc:["butan-2-ol","2-butanol"],cat:"alcohol"},
  {id:31,iupac:"2-methylpropan-1-ol",look:"isobutanol",acc:["2-methylpropan-1-ol","2-methyl-1-propanol","isobutanol"],cat:"alcohol"},
  {id:32,iupac:"2-methylpropan-2-ol",look:"tert-butanol",acc:["2-methylpropan-2-ol","2-methyl-2-propanol","tert-butanol","t-butanol"],cat:"alcohol"},
  // ALDEHYDES
  {id:33,iupac:"methanal",look:"formaldehyde",acc:["methanal","formaldehyde"],cat:"aldehyde"},
  {id:34,iupac:"ethanal",look:"acetaldehyde",acc:["ethanal","acetaldehyde"],cat:"aldehyde"},
  {id:35,iupac:"propanal",look:"propanal",acc:["propanal","propionaldehyde"],cat:"aldehyde"},
  {id:36,iupac:"butanal",look:"butanal",acc:["butanal","butyraldehyde"],cat:"aldehyde"},
  {id:37,iupac:"pentanal",look:"pentanal",acc:["pentanal","valeraldehyde"],cat:"aldehyde"},
  // KETONES
  {id:38,iupac:"propanone",look:"acetone",acc:["propanone","acetone"],cat:"ketone"},
  {id:39,iupac:"butan-2-one",look:"methyl ethyl ketone",acc:["butan-2-one","butanone","2-butanone","methyl ethyl ketone","mek"],cat:"ketone"},
  {id:40,iupac:"pentan-2-one",look:"methyl propyl ketone",acc:["pentan-2-one","2-pentanone","methyl propyl ketone"],cat:"ketone"},
  {id:41,iupac:"pentan-3-one",look:"diethyl ketone",acc:["pentan-3-one","3-pentanone","diethyl ketone"],cat:"ketone"},
  {id:42,iupac:"hexan-2-one",look:"methyl butyl ketone",acc:["hexan-2-one","2-hexanone","methyl butyl ketone"],cat:"ketone"},
  // CARBOXYLIC ACIDS
  {id:43,iupac:"methanoic acid",look:"formic acid",acc:["methanoic acid","formic acid"],cat:"carboxylic acid"},
  {id:44,iupac:"ethanoic acid",look:"acetic acid",acc:["ethanoic acid","acetic acid"],cat:"carboxylic acid"},
  {id:45,iupac:"propanoic acid",look:"propionic acid",acc:["propanoic acid","propionic acid"],cat:"carboxylic acid"},
  {id:46,iupac:"butanoic acid",look:"butyric acid",acc:["butanoic acid","butyric acid"],cat:"carboxylic acid"},
  {id:47,iupac:"pentanoic acid",look:"valeric acid",acc:["pentanoic acid","valeric acid"],cat:"carboxylic acid"},
  // AMINES
  {id:48,iupac:"methanamine",look:"methylamine",acc:["methanamine","methylamine"],cat:"amine"},
  {id:49,iupac:"ethanamine",look:"ethylamine",acc:["ethanamine","ethylamine"],cat:"amine"},
  {id:50,iupac:"propan-1-amine",look:"propylamine",acc:["propan-1-amine","1-propylamine","propylamine"],cat:"amine"},
  {id:51,iupac:"propan-2-amine",look:"isopropylamine",acc:["propan-2-amine","2-propylamine","isopropylamine"],cat:"amine"},
  {id:52,iupac:"N-methylmethanamine",look:"dimethylamine",acc:["n-methylmethanamine","dimethylamine"],cat:"amine"},
  {id:53,iupac:"aniline",look:"aniline",acc:["aniline","phenylamine","aminobenzene","benzenamine"],cat:"amine"},
  // AMIDES
  {id:54,iupac:"methanamide",look:"formamide",acc:["methanamide","formamide"],cat:"amide"},
  {id:55,iupac:"ethanamide",look:"acetamide",acc:["ethanamide","acetamide"],cat:"amide"},
  {id:56,iupac:"propanamide",look:"propanamide",acc:["propanamide"],cat:"amide"},
  {id:57,iupac:"benzamide",look:"benzamide",acc:["benzamide"],cat:"amide"},
  // AROMATICS
  {id:58,iupac:"benzene",look:"benzene",acc:["benzene"],cat:"aromatic"},
  {id:59,iupac:"methylbenzene",look:"toluene",acc:["methylbenzene","toluene"],cat:"aromatic"},
  {id:60,iupac:"ethylbenzene",look:"ethylbenzene",acc:["ethylbenzene"],cat:"aromatic"},
  {id:61,iupac:"chlorobenzene",look:"chlorobenzene",acc:["chlorobenzene"],cat:"aromatic"},
  {id:62,iupac:"nitrobenzene",look:"nitrobenzene",acc:["nitrobenzene"],cat:"aromatic"},
  {id:63,iupac:"styrene",look:"styrene",acc:["styrene","vinylbenzene","ethenylbenzene"],cat:"aromatic"},
];

// ══════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════
let S = {
  compound:null, attempts:0, revealed:false, done:false,
  score:{ok:0,tot:0}, streak:0, usedIds:new Set(), filter:"all",
  chatHist:[], chatBusy:false
};

// ══════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════
const norm = s => s.toLowerCase().trim().replace(/\s+/g,"").replace(/[–—]/g,"-");
const check = (inp,c) => c.acc.some(a => norm(a)===norm(inp));
const pubUrl = lk => `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${encodeURIComponent(lk)}/PNG?image_size=300x300`;
const shuffle = a => { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]} return b; };
const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");

// ══════════════════════════════════════════════════
//  QUIZ
// ══════════════════════════════════════════════════
function filtered(){ return S.filter==="all"?DB:DB.filter(c=>c.cat===S.filter); }

function nextCompound(){
  let pool=filtered().filter(c=>!S.usedIds.has(c.id));
  if(!pool.length){ S.usedIds=new Set(); pool=filtered(); }
  return pool.length ? shuffle(pool)[0] : null;
}

function loadCompound(c){
  S.compound=c; S.attempts=0; S.revealed=false; S.done=false;
  S.usedIds.add(c.id);
  document.getElementById("catBadge").textContent=c.cat.charAt(0).toUpperCase()+c.cat.slice(1);
  ["d1","d2","d3"].forEach(id=>{ document.getElementById(id).className="dot"; });
  const inp=document.getElementById("ansInput");
  inp.value=""; inp.className=""; inp.disabled=false;
  const fb=document.getElementById("fbMsg");
  fb.className="fb"; fb.textContent="";
  document.getElementById("revPanel").className="reveal";
  document.getElementById("nextBtn").className="next-btn";
  document.getElementById("subBtn").disabled=false;
  document.getElementById("mainCard").style.display="";
  document.getElementById("emptyMsg").style.display="none";
  loadImg(c);
  setTimeout(()=>inp.focus(),80);
}

function loadImg(c){
  const img=document.getElementById("structImg");
  const ldr=document.getElementById("imgLdr");
  const err=document.getElementById("imgErr");
  img.style.display="none"; err.style.display="none"; ldr.style.display="block";
  img.onload=()=>{ ldr.style.display="none"; img.style.display="block"; };
  img.onerror=()=>{ ldr.style.display="none"; err.style.display="block"; };
  img.src=pubUrl(c.look);
}

function submit(){
  if(S.revealed||S.done) return;
  const inp=document.getElementById("ansInput");
  const val=inp.value.trim();
  if(!val) return;

  if(check(val,S.compound)){
    inp.className="ok";
    showFb(true);
    S.score.ok++; S.score.tot++; S.streak++;
    S.done=true;
    document.getElementById("subBtn").disabled=true;
    document.getElementById("nextBtn").className="next-btn on";
  } else {
    S.attempts++;
    const dots=["d1","d2","d3"];
    if(S.attempts<=3) document.getElementById(dots[S.attempts-1]).classList.add("bad");
    inp.className="bad";

    if(S.attempts>=3){
      showFb(false,true);
      revealAnswer();
      S.revealed=true; S.streak=0; S.score.tot++;
      document.getElementById("subBtn").disabled=true;
      document.getElementById("nextBtn").className="next-btn on";
    } else {
      showFb(false,false);
      setTimeout(()=>{
        if(!S.revealed){ inp.className=""; document.getElementById("fbMsg").className="fb"; inp.value=""; inp.focus(); }
      },1600);
    }
  }
  updScore();
}

function showFb(ok,final=false){
  const el=document.getElementById("fbMsg");
  if(ok){
    el.textContent=`✅ Correct! "${S.compound.iupac}" — great job!`;
    el.className="fb ok";
  } else if(final){
    el.textContent="❌ 3 attempts used. See the answer and steps below.";
    el.className="fb bad";
  } else {
    const left=3-S.attempts;
    el.textContent=`❌ Incorrect — ${left} attempt${left===1?"":"s"} remaining.`;
    el.className="fb bad";
  }
}

function revealAnswer(){
  document.getElementById("revName").textContent=S.compound.iupac;
  const steps=STEPS[S.compound.cat]||[];
  document.getElementById("stepsUl").innerHTML=
    steps.map((s,i)=>`<li class="step"><div class="snum">${i+1}</div><span>${esc(s)}</span></li>`).join("");
  document.getElementById("revPanel").className="reveal on";
}

function nextQ(){
  const c=nextCompound();
  if(c) loadCompound(c);
  else {
    document.getElementById("mainCard").style.display="none";
    document.getElementById("emptyMsg").style.display="block";
  }
}

function updScore(){
  document.getElementById("sc").textContent=`${S.score.ok}/${S.score.tot}`;
  const sb=document.getElementById("strkBadge");
  if(S.streak>=2){ sb.style.display="flex"; document.getElementById("strkN").textContent=S.streak; }
  else sb.style.display="none";
}

// ══════════════════════════════════════════════════
//  FILTERS
// ══════════════════════════════════════════════════
document.getElementById("filterBar").addEventListener("click",e=>{
  const btn=e.target.closest(".fbtn");
  if(!btn) return;
  document.querySelectorAll(".fbtn").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  S.filter=btn.dataset.cat;
  S.usedIds=new Set();
  const c=nextCompound();
  if(c) loadCompound(c);
  else {
    document.getElementById("mainCard").style.display="none";
    document.getElementById("emptyMsg").style.display="block";
  }
});

document.getElementById("ansInput").addEventListener("keydown",e=>{
  if(e.key==="Enter") submit();
});

// ══════════════════════════════════════════════════
//  CHATBOT  — calls /.netlify/functions/chat
// ══════════════════════════════════════════════════
function addMsg(role,txt){
  const el=document.getElementById("msgs");
  const div=document.createElement("div");
  div.className=`msg ${role}`;
  if(role==="b") div.innerHTML=esc(txt);
  else div.textContent=txt;
  el.appendChild(div);
  el.scrollTop=el.scrollHeight;
}

async function sendChat(){
  if(S.chatBusy) return;
  const ta=document.getElementById("chatIn");
  const msg=ta.value.trim();
  if(!msg) return;
  ta.value="";
  addMsg("u",msg);

  const c=S.compound;
  const sys=c
    ?`You are ChemBot, an expert organic chemistry tutor specializing in IUPAC nomenclature.
The student is practicing naming organic compounds.

Current compound category on screen: "${c.cat}".
${S.revealed||S.done
  ?`The answer has been revealed: "${c.iupac}". Help the student understand exactly WHY this is the correct IUPAC name by walking through the specific steps for this compound.`
  :`The student is still trying to name it. Do NOT reveal the answer. Explain naming rules for ${c.cat}s, hint at what structural features to look for, and guide their thinking with examples of other compounds.`}

Naming steps for ${c.cat}:
${(STEPS[c.cat]||[]).map((s,i)=>`${i+1}. ${s}`).join("\n")}

Be concise, friendly, and encouraging. Respond in the same language the student uses.`
    :`You are ChemBot, an IUPAC nomenclature tutor for organic chemistry. Help with naming rules for alkanes, alkenes, alkynes, alcohols, aldehydes, ketones, carboxylic acids, amines, amides, and aromatic compounds. Be concise and use examples. Respond in the same language the student uses.`;

  S.chatHist.push({role:"user",content:msg});
  S.chatBusy=true;
  document.getElementById("sendBtn").disabled=true;
  document.getElementById("typing").classList.add("on");

  try{
    // ← Calls the Netlify serverless function (API key stays on server)
    const res=await fetch("/.netlify/functions/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({system:sys, messages:S.chatHist.slice(-12)})
    });
    const data=await res.json();
    const bot=data.content?.[0]?.text||"Sorry, I couldn't process that.";
    S.chatHist.push({role:"assistant",content:bot});
    document.getElementById("typing").classList.remove("on");
    addMsg("b",bot);
  } catch(e){
    document.getElementById("typing").classList.remove("on");
    addMsg("b","⚠ Connection error. Please try again.");
    S.chatHist.pop();
  }

  S.chatBusy=false;
  document.getElementById("sendBtn").disabled=false;
  document.getElementById("chatIn").focus();
  document.getElementById("msgs").scrollTop=9999;
}

function chatKey(e){
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat();}
}

function toggleChat(){
  document.getElementById("chatPanel").classList.toggle("mob-open");
}

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
addMsg("b",`👋 Hi! I'm ChemBot — your IUPAC nomenclature tutor.

Try naming the compound on the left. You have 3 attempts before the answer is revealed.

Ask me about:
• What functional group to look for
• Naming rules for any compound type
• Step-by-step guidance

I won't give away the answer, but I'll guide you there! 🧪`);

const first=nextCompound();
if(first) loadCompound(first);
</script>
</body>
</html>
